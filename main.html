<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calculator</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="calculator">

    <input type="text" id="input" readonly>

    <div class="buttons">

      <button id="block7" class="number">7</button>
      <button id="block8" class="number">8</button>
      <button id="block9" class="number">9</button>
      <button id="divide" class="operator">/</button>

      <button id="block4" class="number">4</button>
      <button id="block5" class="number">5</button>
      <button id="block6" class="number">6</button>
      <button id="multiply" class="operator">*</button>

      <button id="block1" class="number">1</button>
      <button id="block2" class="number">2</button>
      <button id="block3" class="number">3</button>
      <button id="minus" class="operator">-</button>

      <button id="dot">.</button>
      <button id="block0" class="number">0</button>
      <button id="ans">=</button>
      <button id="plus" class="operator">+</button>

      <button id="clr">Clear</button>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
